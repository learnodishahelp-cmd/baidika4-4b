        @media (max-width: 420px) {

<body>

    <div class="toast" id="toast" aria-live="polite">🔗 ଲିଙ୍କ କପି ହୋଇଛି!</div>

    <script>
        (function() {
            // Video data by topic
            const topics = {
                adhara: {
                    name: 'ଆଧାର ଗୁଣନ',
                    label: 'Adhara Gunana',
                    parts: [
                        { id: 'zfZwcK1aSMM', title: 'ଭାଗ ୪' },
                        { id: '1YrFn3jb32k', title: 'ଭାଗ ୫' },
                        { id: 'IWYCnPlAL5I', title: 'ଭାଗ ୬' }
                    ]
                },
                samadasak: {
                    name: 'ସମଦଶକ ମିତ୍ର',
                    label: 'Samadasak Mitra',
                    parts: [
                        { id: 'BvaPhMlZksA', title: 'ଭାଗ ୭' },
                        { id: 'S_eEStJ8DIQ', title: 'ଭାଗ ୮' },
                        { id: 'Yd0ycvcGhnk', title: 'ଭାଗ ୯' }
                    ]
                }
            };

            let currentTopic = 'adhara';
            let currentPartIndex = 0;

            const SHARE_URL = 'https://learnodishahelp-cmd.github.io/Quizmaster4/';
            const SHARE_TITLE = 'ଶ୍ରେଣୀ ୪ - ଆଧାର ଗୁଣନ | Class 4 Adhara Gunana (Base Multiplication)';
            const SHARE_TEXT = 'ଓଡ଼ିଆ ମାଧ୍ୟମରେ ବୈଦିକ ଗଣିତ ଆଧାର ଗୁଣନ (Base Multiplication) ଶିଖନ୍ତୁ! Check out this Class 4 Vedic Math app.';

            const iframe = document.getElementById('videoIframe');
            const topicLabelEl = document.getElementById('topicLabel');
            const partTitleEl = document.getElementById('partTitle');
            const partsContainer = document.getElementById('partsContainer');

            function renderParts() {
                const topic = topics[currentTopic];
                partsContainer.innerHTML = '';
                topic.parts.forEach((part, idx) => {
                    const btn = document.createElement('button');
                    btn.className = 'part-btn' + (idx === currentPartIndex ? ' active-part' : '');
                    btn.textContent = part.title;
                    btn.setAttribute('data-index', idx);
                    btn.addEventListener('click', () => switchPart(idx, btn));
                    partsContainer.appendChild(btn);
                });
            }

            function loadVideo() {
                const topic = topics[currentTopic];
                const part = topic.parts[currentPartIndex];
                iframe.src = `https://www.youtube.com/embed/${part.id}?rel=0&modestbranding=1`;
                topicLabelEl.textContent = topic.name;
                partTitleEl.textContent = part.title;
                document.querySelectorAll('.part-btn').forEach((btn, idx) => {
                    btn.classList.toggle('active-part', idx === currentPartIndex);
                });
            }

            function switchPart(index, btnElement) {
                if (index === currentPartIndex) return;
                currentPartIndex = index;
                loadVideo();
                if (btnElement) {
                    btnElement.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                }
                const videoCard = document.getElementById('videoCard');
                videoCard.style.transform = 'scale(1.015)';
                videoCard.style.transition = 'transform 0.2s ease-out';
                setTimeout(() => { videoCard.style.transform = 'scale(1)'; }, 200);
                if (navigator.vibrate) navigator.vibrate(8);
            }

            window.setTopic = function(topicKey, btnElement) {
                if (topicKey === currentTopic) return;
                document.querySelectorAll('.topic-btn').forEach(b => b.classList.remove('active'));
                if (btnElement) btnElement.classList.add('active');
                currentTopic = topicKey;
                currentPartIndex = 0;
                renderParts();
                loadVideo();
                if (btnElement) btnElement.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
                if (navigator.vibrate) navigator.vibrate(8);
            };

            function showToast(msg) {
                const toast = document.getElementById('toast');
                toast.textContent = msg;
                toast.classList.add('show');
                clearTimeout(toast._timeout);
                toast._timeout = setTimeout(() => toast.classList.remove('show'), 2500);
            }

            async function handleShare() {
                if (navigator.share) {
                    try {
                        await navigator.share({ title: SHARE_TITLE, text: SHARE_TEXT, url: SHARE_URL });
                    } catch (e) {}
                } else {
                    try {
                        await navigator.clipboard.writeText(SHARE_URL);
                        showToast('🔗 ଲିଙ୍କ କପି ହୋଇଛି!');
                    } catch (e) {
                        const ta = document.createElement('textarea');
                        ta.value = SHARE_URL;
                        document.body.appendChild(ta);
                        ta.select();
                        document.execCommand('copy');
                        document.body.removeChild(ta);
                        showToast('🔗 ଲିଙ୍କ କପି ହୋଇଛି!');
                    }
                }
            }

            document.getElementById('shareButton').addEventListener('click', handleShare);

            partsContainer.addEventListener('touchstart', (e) => {
                const btn = e.target.closest('.part-btn');
                if (btn) {
                    btn.style.transform = 'scale(0.94)';
                    btn.style.transition = 'transform 0.1s ease';
                }
            }, { passive: true });
            partsContainer.addEventListener('touchend', (e) => {
                const btn = e.target.closest('.part-btn');
                if (btn) {
                    btn.style.transform = '';
                    btn.style.transition = 'transform 0.2s ease';
                }
            });

            document.addEventListener('keydown', (e) => {
                const topic = topics[currentTopic];
                if (e.key === 'ArrowRight' && currentPartIndex < topic.parts.length - 1) {
                    e.preventDefault();
                    switchPart(currentPartIndex + 1, document.querySelector(`.part-btn[data-index="${currentPartIndex+1}"]`));
                } else if (e.key === 'ArrowLeft' && currentPartIndex > 0) {
                    e.preventDefault();
                    switchPart(currentPartIndex - 1, document.querySelector(`.part-btn[data-index="${currentPartIndex-1}"]`));
                }
            });

            renderParts();
            loadVideo();

            console.log('✅ ଆଧାର ଗୁଣନ ଓ ସମଦଶକ ମିତ୍ର ଏକକ ଗୁଣନ ଆପ୍ ପ୍ରସ୍ତୁତ | Adhara Gunana & Samadasak Mitra Ekak Gunana App');
        })();
    </script>
